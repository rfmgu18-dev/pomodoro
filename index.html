<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Saira+Stencil&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <title>Pomodoro Timer</title>
  
</head>
<body>
  <div class="recuadro">
    <h1>POMODORO TIMER</h1>
  </div>
<div class="tomate-container">
  <video class="tomate" src="multimedia/pomodoro-girando.webm" autoplay muted loop></video>
</div>

<div class="timer">
  <div id="display">25:00</div>
  <div class="controls">
    <button id="startBtn" title="Inicia el Pomodoro">Iniciar</button>
    <button id="pauseBtn" title="Pausa el Pomodoro">Pausar</button>
    <button id="resetBtn" title="Resetea el Pomodoro">Reiniciar</button>
    <button id="skipBtn" title="Salta el modo actual del Pomodoro">Saltar</button>
  </div>
  <h3>Este proyecto fue desarrollado por:</h3>
  <a class="github" href="https://github.com/rfmgu18-dev" target="_blank" rel="noopener noreferrer">Rubén Maldonado.</a>
</div>
</body>
<script src="scripts.js"></script>
</html>
